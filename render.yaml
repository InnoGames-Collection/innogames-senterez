# Render.com — Senterez game server (API + Socket.IO)
# Deploy at https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: senterez-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_HTTPS
        value: false
      - key: TRUST_PROXY
        value: true
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SEED_INITIAL_ADMIN
        value: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@innosphere.et
